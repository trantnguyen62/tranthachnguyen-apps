  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#38bdf8" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>
  <!-- Orb glow top-right -->
  <circle cx="950" cy="120" r="200" fill="#38bdf8" opacity="0.06"/>
  <!-- Orb glow bottom-left -->
  <circle cx="200" cy="520" r="180" fill="#818cf8" opacity="0.06"/>
  <!-- Logo icon area -->
  <rect x="90" y="195" width="72" height="72" rx="14" fill="#0f172a" stroke="#38bdf8" stroke-width="2" opacity="0.9"/>
  <text x="126" y="247" font-family="monospace" font-weight="bold" font-size="38" fill="#38bdf8" text-anchor="middle">⚡</text>
  <!-- Title -->
  <text x="184" y="243" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="56" fill="#f8fafc">DevOps</text>
  <text x="474" y="243" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="56" fill="url(#accent)">Mastery</text>
  <!-- Subtitle -->
  <text x="90" y="295" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="26" fill="#94a3b8">Interactive flashcards, quizzes &amp; cheat sheets</text>
  <!-- Accent line -->
  <rect x="90" y="320" width="420" height="3" rx="2" fill="url(#accent)"/>
  <!-- Feature pills -->
  <rect x="90" y="360" width="148" height="44" rx="22" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="164" y="387" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#38bdf8" text-anchor="middle">📇 Flashcards</text>
  <rect x="256" y="360" width="110" height="44" rx="22" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="311" y="387" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#818cf8" text-anchor="middle">❓ Quiz</text>
  <rect x="384" y="360" width="110" height="44" rx="22" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <text x="439" y="387" font-family="system-ui,-apple-system,sans-serif" font-size="18" fill="#34d399" text-anchor="middle">💻 Cmds</text>
  <!-- Topics -->
  <text x="90" y="460" font-family="system-ui,-apple-system,sans-serif" font-weight="600" font-size="20" fill="#64748b">Covers: Docker · Kubernetes · CI/CD · AWS · Terraform · Git · Linux · Ansible</text>
  <!-- URL -->
  <text x="90" y="560" font-family="monospace" font-size="18" fill="#334155">devopsstudy.tranthachnguyen.com</text>
  <!-- Free badge -->
  <rect x="1040" y="545" width="110" height="44" rx="8" fill="#38bdf8" opacity="0.15" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="1095" y="572" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="18" fill="#38bdf8" text-anchor="middle">FREE</text>
