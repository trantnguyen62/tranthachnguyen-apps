<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E94560"/>
      <stop offset="100%" stop-color="#F4A261"/>
    </linearGradient>
  </defs>
  <!-- Card background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Card body -->
  <rect x="4" y="7" width="24" height="18" rx="3" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="0.75"/>
  <!-- Photo placeholder -->
  <rect x="7" y="10" width="8" height="9" rx="1.5" fill="url(#accent)" opacity="0.9"/>
  <!-- Face circle -->
  <circle cx="11" cy="13.5" r="2.5" fill="#fff" opacity="0.9"/>
  <!-- Lines -->
  <rect x="18" y="11" width="7" height="1.5" rx="0.75" fill="rgba(255,255,255,0.5)"/>
  <rect x="18" y="14" width="5" height="1.5" rx="0.75" fill="rgba(255,255,255,0.3)"/>
  <rect x="18" y="17" width="6" height="1.5" rx="0.75" fill="rgba(255,255,255,0.2)"/>
  <!-- Bottom strip -->
  <rect x="4" y="22" width="24" height="3" rx="0 0 3 3" fill="url(#accent)" opacity="0.15"/>
  <!-- Top accent line -->
  <rect x="4" y="7" width="24" height="2" rx="3 3 0 0" fill="url(#accent)" opacity="0.7"/>
</svg>
