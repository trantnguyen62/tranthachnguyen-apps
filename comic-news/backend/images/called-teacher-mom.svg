<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#bg)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="400" height="75" fill="url(#header)"/>
  <text x="200" y="30" text-anchor="middle" fill="white" font-size="15" font-family="Georgia, serif" font-weight="bold">I Called My Teacher</text>
  <text x="200" y="54" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="13" font-family="Georgia, serif">"Mom" in Front of the Whole Class</text>

  <!-- Classroom floor -->
  <rect x="0" y="380" width="400" height="110" fill="#1e1e30"/>
  <line x1="0" y1="380" x2="400" y2="380" stroke="#2a2a4a" stroke-width="1.5"/>

  <!-- Blackboard -->
  <rect x="80" y="100" width="240" height="120" rx="4" fill="#1a3a2a" stroke="#2a5a3a" stroke-width="2"/>
  <text x="200" y="150" text-anchor="middle" fill="#a0c8a0" font-size="11" font-family="Georgia, serif">TUESDAY - 3RD PERIOD</text>
  <line x1="110" y1="168" x2="290" y2="168" stroke="#2a5a3a" stroke-width="1" opacity="0.5"/>
  <text x="200" y="190" text-anchor="middle" fill="#8ab8a0" font-size="10" font-family="Georgia, serif" opacity="0.7">Quiz Results</text>

  <!-- Teacher figure (left of board) -->
  <rect x="48" y="248" width="38" height="120" rx="5" fill="#2a4a6a"/>
  <circle cx="67" cy="230" r="20" fill="#c8956a"/>
  <ellipse cx="67" cy="213" rx="18" ry="8" fill="#3a2010"/>
  <!-- Teacher arm holding quiz -->
  <rect x="86" y="272" width="40" height="7" rx="3" fill="#2a4a6a"/>
  <!-- Quiz paper -->
  <rect x="124" y="262" width="28" height="36" rx="2" fill="#f5f0e0"/>
  <line x1="129" y1="272" x2="147" y2="272" stroke="#9a9a9a" stroke-width="1.5"/>
  <line x1="129" y1="279" x2="147" y2="279" stroke="#9a9a9a" stroke-width="1.5"/>

  <!-- Student at desk (right side) -->
  <rect x="250" y="290" width="42" height="80" rx="5" fill="#3a5a3a"/>
  <circle cx="271" cy="272" r="19" fill="#d4a06a"/>
  <ellipse cx="271" cy="256" rx="17" ry="8" fill="#2a1a0a"/>
  <!-- Desk -->
  <rect x="220" y="360" width="110" height="12" rx="3" fill="#3a2a1a"/>
  <rect x="240" y="372" width="8" height="28" rx="2" fill="#2a1a0a"/>
  <rect x="304" y="372" width="8" height="28" rx="2" fill="#2a1a0a"/>

  <!-- Student's "Thanks, Mom." speech bubble (red, prominent) -->
  <ellipse cx="200" cy="200" rx="85" ry="32" fill="#ef4444"/>
  <polygon points="240,232 258,248 228,236" fill="#ef4444"/>
  <text x="200" y="195" text-anchor="middle" fill="white" font-size="17" font-family="Georgia, serif" font-weight="bold" font-style="italic">Thanks, Mom.</text>

  <!-- Teacher's neutral response bubble -->
  <ellipse cx="82" cy="155" rx="60" ry="24" fill="white" opacity="0.93"/>
  <polygon points="78,179 62,194 88,183" fill="white" opacity="0.93"/>
  <text x="82" y="151" text-anchor="middle" fill="#1a1a2e" font-size="11" font-family="Georgia, serif" font-style="italic">You're welcome.</text>

  <!-- Awkward lines from student -->
  <line x1="362" y1="272" x2="376" y2="262" stroke="#6a6a9a" stroke-width="1.5" opacity="0.55"/>
  <line x1="366" y1="282" x2="381" y2="282" stroke="#6a6a9a" stroke-width="1.5" opacity="0.55"/>
  <line x1="362" y1="292" x2="376" y2="302" stroke="#6a6a9a" stroke-width="1.5" opacity="0.55"/>

  <!-- Bottom panel -->
  <rect x="0" y="490" width="400" height="110" fill="rgba(0,0,0,0.35)"/>

  <!-- Genre badge -->
  <rect x="20" y="502" width="100" height="22" rx="11" fill="rgba(239,68,68,0.2)"/>
  <text x="70" y="517" text-anchor="middle" fill="#ef4444" font-size="10" font-family="Georgia, serif" font-weight="bold" letter-spacing="1">SLICE OF LIFE</text>

  <!-- Stars -->
  <text x="20" y="549" fill="#f59e0b" font-size="15">★★★★★</text>
  <text x="103" y="548" fill="#9ca3af" font-size="12" font-family="sans-serif"> 4.8</text>

  <!-- Author -->
  <text x="20" y="572" fill="#6b7280" font-size="11" font-family="Georgia, serif">Anonymous</text>

  <!-- Decorative dots -->
  <circle cx="372" cy="510" r="3" fill="#ef4444" opacity="0.35"/>
  <circle cx="360" cy="530" r="2" fill="#f97316" opacity="0.25"/>
  <circle cx="382" cy="555" r="4" fill="#ef4444" opacity="0.18"/>
</svg>
