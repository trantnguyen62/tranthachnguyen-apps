<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#bg)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="400" height="75" fill="url(#header)"/>
  <text x="200" y="30" text-anchor="middle" fill="white" font-size="14" font-family="Georgia, serif" font-weight="bold">I Forgot Someone's Name</text>
  <text x="200" y="54" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="13" font-family="Georgia, serif">Mid-Introduction</text>

  <!-- Floor -->
  <rect x="0" y="430" width="400" height="60" fill="#0f0f1a"/>
  <!-- Back wall -->
  <rect x="0" y="100" width="400" height="330" fill="#1a1a30"/>

  <!-- Person on left (the narrator) -->
  <circle cx="100" cy="218" r="22" fill="#d4a06a"/>
  <ellipse cx="100" cy="200" rx="20" ry="9" fill="#2a1a0a"/>
  <rect x="76" y="240" width="48" height="80" rx="5" fill="#2a4a6a"/>
  <!-- Left arm extended gesturing -->
  <rect x="124" y="256" width="50" height="10" rx="5" fill="#2a4a6a"/>

  <!-- Person in middle (colleague being introduced) -->
  <circle cx="220" cy="218" r="22" fill="#c8956a"/>
  <ellipse cx="220" cy="200" rx="20" ry="9" fill="#1a1a1a"/>
  <rect x="196" y="240" width="48" height="80" rx="5" fill="#3a3a5a"/>

  <!-- Person on right (manager) -->
  <circle cx="330" cy="218" r="22" fill="#b07a5a"/>
  <ellipse cx="330" cy="200" rx="20" ry="9" fill="#3a2a1a"/>
  <rect x="306" y="240" width="48" height="80" rx="5" fill="#1a3a2a"/>

  <!-- Narrator's speech bubble: "Have you met—" with trailing off dots -->
  <ellipse cx="155" cy="148" rx="105" ry="32" fill="white" opacity="0.95"/>
  <polygon points="130,178 112,196 148,184" fill="white" opacity="0.95"/>
  <text x="155" y="144" text-anchor="middle" fill="#1a1a2e" font-size="12" font-family="Georgia, serif" font-style="italic">Have you met</text>
  <text x="155" y="162" text-anchor="middle" fill="#1a1a2e" font-size="16" font-family="Georgia, serif" font-weight="bold">— ...</text>

  <!-- Question mark thought bubble above narrator's head -->
  <circle cx="72" cy="185" r="7" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="62" cy="174" r="5" fill="#8b5cf6" opacity="0.35"/>
  <circle cx="55" cy="165" r="3.5" fill="#8b5cf6" opacity="0.2"/>
  <text x="62" y="162" text-anchor="middle" fill="#8b5cf6" font-size="18" font-family="Georgia, serif" font-weight="bold" opacity="0.7">?</text>

  <!-- Colleague looking confused (slight eyebrow raise) -->
  <line x1="208" y1="209" x2="220" y2="207" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="220" y1="207" x2="232" y2="209" stroke="#1a1a2e" stroke-width="2"/>

  <!-- "From the third floor." label coming from gesture arm -->
  <rect x="148" y="338" width="160" height="28" rx="8" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1" opacity="0.7"/>
  <text x="228" y="356" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="Georgia, serif" font-style="italic">"...from the third floor."</text>

  <!-- Bottom panel -->
  <rect x="0" y="490" width="400" height="110" fill="rgba(0,0,0,0.35)"/>

  <!-- Genre badge -->
  <rect x="20" y="502" width="100" height="22" rx="11" fill="rgba(139,92,246,0.2)"/>
  <text x="70" y="517" text-anchor="middle" fill="#8b5cf6" font-size="10" font-family="Georgia, serif" font-weight="bold" letter-spacing="1">SLICE OF LIFE</text>

  <!-- Stars -->
  <text x="20" y="549" fill="#f59e0b" font-size="15">★★★★★</text>
  <text x="103" y="548" fill="#9ca3af" font-size="12" font-family="sans-serif"> 4.8</text>

  <!-- Author -->
  <text x="20" y="572" fill="#6b7280" font-size="11" font-family="Georgia, serif">Anonymous</text>

  <!-- Decorative dots -->
  <circle cx="372" cy="510" r="3" fill="#8b5cf6" opacity="0.35"/>
  <circle cx="360" cy="530" r="2" fill="#a78bfa" opacity="0.25"/>
  <circle cx="382" cy="555" r="4" fill="#8b5cf6" opacity="0.18"/>
</svg>
