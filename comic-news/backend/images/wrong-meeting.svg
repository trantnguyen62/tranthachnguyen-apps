<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#bg)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="400" height="75" fill="url(#header)"/>
  <text x="200" y="30" text-anchor="middle" fill="white" font-size="14" font-family="Georgia, serif" font-weight="bold">I Confidently Walked Into</text>
  <text x="200" y="54" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="13" font-family="Georgia, serif">the Wrong Meeting</text>

  <!-- Room background (conference room) -->
  <rect x="20" y="100" width="360" height="300" rx="4" fill="#1e2a3a" stroke="#2a3a4a" stroke-width="1.5"/>

  <!-- Presentation screen at back wall -->
  <rect x="60" y="118" width="200" height="120" rx="3" fill="#2a3f55" stroke="#3a5a75" stroke-width="1.5"/>
  <rect x="68" y="126" width="184" height="104" rx="2" fill="#1a3050"/>
  <!-- Slide content lines -->
  <rect x="80" y="138" width="100" height="8" rx="3" fill="#3a6a8a" opacity="0.7"/>
  <rect x="80" y="154" width="140" height="5" rx="2" fill="#2a5a7a" opacity="0.5"/>
  <rect x="80" y="166" width="120" height="5" rx="2" fill="#2a5a7a" opacity="0.5"/>
  <rect x="80" y="178" width="110" height="5" rx="2" fill="#2a5a7a" opacity="0.5"/>
  <!-- Chart bars -->
  <rect x="80" y="200" width="18" height="20" rx="1" fill="#0ea5e9" opacity="0.6"/>
  <rect x="104" y="190" width="18" height="30" rx="1" fill="#0ea5e9" opacity="0.6"/>
  <rect x="128" y="210" width="18" height="10" rx="1" fill="#0ea5e9" opacity="0.6"/>
  <rect x="152" y="196" width="18" height="24" rx="1" fill="#0ea5e9" opacity="0.6"/>
  <rect x="176" y="203" width="18" height="17" rx="1" fill="#0ea5e9" opacity="0.6"/>

  <!-- Presenter person (at front, right of screen) -->
  <circle cx="288" cy="168" r="16" fill="#b07a5a"/>
  <rect x="272" y="184" width="32" height="60" rx="4" fill="#1a1a3a"/>
  <!-- Pointer arm -->
  <rect x="258" y="194" width="35" height="7" rx="3" fill="#1a1a3a"/>
  <line x1="258" y1="197" x2="244" y2="205" stroke="#c8956a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Conference table -->
  <ellipse cx="200" cy="360" rx="155" ry="42" fill="#1a2535" stroke="#2a3545" stroke-width="2"/>

  <!-- Seated figures around table -->
  <!-- Left side -->
  <circle cx="75" cy="342" r="14" fill="#c8956a"/>
  <rect x="62" y="356" width="26" height="44" rx="3" fill="#2a3a5a"/>
  <!-- Far left -->
  <circle cx="52" cy="376" r="12" fill="#b07a5a"/>
  <rect x="40" y="388" width="24" height="36" rx="3" fill="#3a2a4a"/>
  <!-- Right side -->
  <circle cx="325" cy="342" r="14" fill="#d4a06a"/>
  <rect x="312" y="356" width="26" height="44" rx="3" fill="#1a3a2a"/>
  <!-- Far right -->
  <circle cx="348" cy="376" r="12" fill="#b07a5a"/>
  <rect x="336" y="388" width="24" height="36" rx="3" fill="#2a3a4a"/>
  <!-- Back center -->
  <circle cx="200" cy="328" r="14" fill="#c8956a"/>
  <rect x="186" y="342" width="28" height="44" rx="3" fill="#3a2a2a"/>

  <!-- Narrator in doorway (bottom left, walking in) -->
  <circle cx="52" cy="262" r="18" fill="#d4a06a"/>
  <ellipse cx="52" cy="244" rx="16" ry="7" fill="#2a1a0a"/>
  <rect x="34" y="280" width="36" height="65" rx="4" fill="#2a4a6a"/>
  <!-- Open door behind them -->
  <rect x="20" y="248" width="28" height="90" rx="2" fill="#0f1520" stroke="#2a3545" stroke-width="1.5"/>
  <circle cx="44" cy="293" r="3" fill="#5a6a7a"/>

  <!-- "Morning, everyone!" speech bubble (from narrator) -->
  <ellipse cx="148" cy="230" rx="88" ry="26" fill="white" opacity="0.95"/>
  <polygon points="84,254 68,270 98,262" fill="white" opacity="0.95"/>
  <text x="148" y="235" text-anchor="middle" fill="#1a1a2e" font-size="11.5" font-family="Georgia, serif" font-style="italic">Morning, everyone!</text>

  <!-- Everyone looking (dots at narrator from seated people) -->
  <line x1="75" y1="342" x2="68" y2="285" stroke="#6a7a9a" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="200" y1="328" x2="90" y2="275" stroke="#6a7a9a" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="325" y1="342" x2="100" y2="270" stroke="#6a7a9a" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- "Wrong room." badge -->
  <ellipse cx="278" cy="265" rx="72" ry="24" fill="#ef4444" opacity="0.92"/>
  <text x="278" y="270" text-anchor="middle" fill="white" font-size="14" font-family="Georgia, serif" font-weight="bold" font-style="italic">Wrong room.</text>

  <!-- Bottom panel -->
  <rect x="0" y="490" width="400" height="110" fill="rgba(0,0,0,0.35)"/>

  <!-- Genre badge -->
  <rect x="20" y="502" width="100" height="22" rx="11" fill="rgba(14,165,233,0.2)"/>
  <text x="70" y="517" text-anchor="middle" fill="#0ea5e9" font-size="10" font-family="Georgia, serif" font-weight="bold" letter-spacing="1">SLICE OF LIFE</text>

  <!-- Stars -->
  <text x="20" y="549" fill="#f59e0b" font-size="15">★★★★★</text>
  <text x="103" y="548" fill="#9ca3af" font-size="12" font-family="sans-serif"> 4.7</text>

  <!-- Author -->
  <text x="20" y="572" fill="#6b7280" font-size="11" font-family="Georgia, serif">Anonymous</text>

  <!-- Decorative dots -->
  <circle cx="372" cy="510" r="3" fill="#0ea5e9" opacity="0.35"/>
  <circle cx="360" cy="530" r="2" fill="#38bdf8" opacity="0.25"/>
  <circle cx="382" cy="555" r="4" fill="#0ea5e9" opacity="0.18"/>
</svg>
