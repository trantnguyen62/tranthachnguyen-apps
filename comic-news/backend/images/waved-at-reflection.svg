<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="window" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#152d48"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#bg)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="400" height="75" fill="url(#header)"/>
  <text x="200" y="30" text-anchor="middle" fill="white" font-size="14" font-family="Georgia, serif" font-weight="bold">I Waved at My Own Reflection</text>
  <text x="200" y="54" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="13" font-family="Georgia, serif">in a Store Window</text>

  <!-- Sidewalk / street background -->
  <rect x="0" y="380" width="400" height="110" fill="#111122"/>
  <rect x="0" y="380" width="400" height="8" fill="#1a1a30"/>
  <!-- Pavement lines -->
  <line x1="0" y1="410" x2="400" y2="410" stroke="#1e2035" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="440" x2="400" y2="440" stroke="#1e2035" stroke-width="1" opacity="0.6"/>

  <!-- Store building facade -->
  <rect x="30" y="90" width="340" height="295" fill="#1a2535" stroke="#2a3545" stroke-width="2"/>

  <!-- Large plate glass store window (main scene) -->
  <rect x="50" y="110" width="300" height="250" rx="3" fill="url(#window)" stroke="#3a5a75" stroke-width="2"/>
  <!-- Window reflection sheen -->
  <line x1="52" y1="112" x2="100" y2="358" stroke="white" stroke-width="1.5" opacity="0.08"/>
  <line x1="80" y1="110" x2="140" y2="358" stroke="white" stroke-width="1" opacity="0.05"/>

  <!-- Store interior glimpsed through window (shelves) -->
  <rect x="65" y="230" width="110" height="12" rx="2" fill="#2a3a50" opacity="0.6"/>
  <rect x="65" y="252" width="110" height="12" rx="2" fill="#2a3a50" opacity="0.6"/>
  <rect x="65" y="274" width="110" height="12" rx="2" fill="#2a3a50" opacity="0.6"/>
  <!-- Items on shelves -->
  <rect x="70" y="220" width="12" height="10" rx="1" fill="#3a6a5a" opacity="0.5"/>
  <rect x="86" y="222" width="10" height="8" rx="1" fill="#5a6a3a" opacity="0.5"/>
  <rect x="70" y="242" width="14" height="10" rx="1" fill="#6a4a3a" opacity="0.5"/>

  <!-- REFLECTION: person in window (left side of window, mirrored) -->
  <!-- Reflection figure (same pose as real person, slight blue tint) -->
  <circle cx="148" cy="230" r="19" fill="#8ab4c8" opacity="0.65"/>
  <ellipse cx="148" cy="213" rx="17" ry="7" fill="#1a2a3a" opacity="0.65"/>
  <rect x="130" y="249" width="36" height="65" rx="4" fill="#2a3a5a" opacity="0.65"/>
  <!-- Reflection arm waving (mirror of real person) -->
  <rect x="94" y="264" width="42" height="10" rx="5" fill="#2a3a5a" opacity="0.65"/>
  <line x1="94" y1="264" x2="76" y2="250" stroke="#8ab4c8" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>

  <!-- REAL PERSON (right side, walking toward window) -->
  <circle cx="270" cy="220" r="20" fill="#d4a06a"/>
  <ellipse cx="270" cy="202" rx="18" ry="8" fill="#2a1a0a"/>
  <rect x="252" y="240" width="38" height="68" rx="4" fill="#2a4a6a"/>
  <!-- Waving arm raised -->
  <rect x="288" y="252" width="44" height="10" rx="5" fill="#2a4a6a"/>
  <line x1="332" y1="252" x2="348" y2="238" stroke="#d4a06a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Real person speech bubble: "...oh." -->
  <ellipse cx="316" cy="175" rx="52" ry="24" fill="white" opacity="0.95"/>
  <polygon points="300,197 288,212 308,205" fill="white" opacity="0.95"/>
  <text x="316" y="180" text-anchor="middle" fill="#1a1a2e" font-size="15" font-family="Georgia, serif" font-weight="bold" font-style="italic">...oh.</text>

  <!-- Reflection wave back (bubble in window) -->
  <ellipse cx="148" cy="176" rx="56" ry="22" fill="rgba(138,180,200,0.3)" stroke="#3a6a8a" stroke-width="1"/>
  <polygon points="165,196 175,210 155,204" fill="rgba(138,180,200,0.3)" stroke="#3a6a8a" stroke-width="1"/>
  <text x="148" y="181" text-anchor="middle" fill="#8ab4c8" font-size="13" font-family="Georgia, serif" font-style="italic">👋</text>

  <!-- Window frame lines -->
  <line x1="200" y1="110" x2="200" y2="360" stroke="#2a3a50" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="235" x2="350" y2="235" stroke="#2a3a50" stroke-width="1.5" opacity="0.3"/>

  <!-- Bottom panel -->
  <rect x="0" y="490" width="400" height="110" fill="rgba(0,0,0,0.35)"/>

  <!-- Genre badge -->
  <rect x="20" y="502" width="100" height="22" rx="11" fill="rgba(16,185,129,0.2)"/>
  <text x="70" y="517" text-anchor="middle" fill="#10b981" font-size="10" font-family="Georgia, serif" font-weight="bold" letter-spacing="1">SLICE OF LIFE</text>

  <!-- Stars -->
  <text x="20" y="549" fill="#f59e0b" font-size="15">★★★★★</text>
  <text x="103" y="548" fill="#9ca3af" font-size="12" font-family="sans-serif"> 4.9</text>

  <!-- Author -->
  <text x="20" y="572" fill="#6b7280" font-size="11" font-family="Georgia, serif">Anonymous</text>

  <!-- Decorative dots -->
  <circle cx="372" cy="510" r="3" fill="#10b981" opacity="0.35"/>
  <circle cx="360" cy="530" r="2" fill="#34d399" opacity="0.25"/>
  <circle cx="382" cy="555" r="4" fill="#10b981" opacity="0.18"/>
</svg>
