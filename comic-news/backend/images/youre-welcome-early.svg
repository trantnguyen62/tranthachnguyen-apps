<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#bg)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="400" height="75" fill="url(#header)"/>
  <text x="200" y="30" text-anchor="middle" fill="white" font-size="14" font-family="Georgia, serif" font-weight="bold">I Replied "You're Welcome"</text>
  <text x="200" y="54" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="12" font-family="Georgia, serif">Before Anyone Said Thank You</text>

  <!-- Office floor -->
  <rect x="0" y="370" width="400" height="120" fill="#1e1e30"/>
  <line x1="0" y1="370" x2="400" y2="370" stroke="#2a2a4a" stroke-width="1.5"/>

  <!-- Left desk -->
  <rect x="30" y="320" width="120" height="10" rx="3" fill="#3a2a1a"/>
  <rect x="50" y="330" width="8" height="40" rx="2" fill="#2a1a0a"/>
  <rect x="128" y="330" width="8" height="40" rx="2" fill="#2a1a0a"/>
  <!-- Monitor on desk -->
  <rect x="58" y="274" width="60" height="42" rx="3" fill="#2a3a5a" stroke="#3a4a6a" stroke-width="1.5"/>
  <rect x="84" y="316" width="8" height="8" rx="1" fill="#2a3a5a"/>
  <rect x="75" y="322" width="26" height="4" rx="1" fill="#2a3a5a"/>

  <!-- Person at desk (protagonist, left) -->
  <rect x="60" y="260" width="36" height="80" rx="5" fill="#2a4a6a"/>
  <circle cx="78" cy="242" r="19" fill="#d4a06a"/>
  <ellipse cx="78" cy="226" rx="17" ry="8" fill="#1a1a1a"/>

  <!-- Right person (standing, asking question) -->
  <rect x="260" y="252" width="38" height="90" rx="5" fill="#5a3a6a"/>
  <circle cx="279" cy="234" r="20" fill="#c8956a"/>
  <ellipse cx="279" cy="217" rx="18" ry="8" fill="#2a1a0a"/>

  <!-- Colleague speech bubble (about to say thank you - not yet) -->
  <ellipse cx="284" cy="170" rx="72" ry="26" fill="white" opacity="0.93"/>
  <polygon points="274,196 260,212 282,200" fill="white" opacity="0.93"/>
  <text x="284" y="166" text-anchor="middle" fill="#1a1a2e" font-size="11.5" font-family="Georgia, serif" font-style="italic">*still processing*</text>
  <text x="284" y="183" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Georgia, serif" font-style="italic">(hasn't said it yet)</text>

  <!-- Protagonist's "You're welcome!" bubble (red, prominent) -->
  <ellipse cx="128" cy="175" rx="85" ry="32" fill="#ef4444"/>
  <polygon points="100,207 84,224 112,212" fill="#ef4444"/>
  <text x="128" y="168" text-anchor="middle" fill="white" font-size="15" font-family="Georgia, serif" font-weight="bold" font-style="italic">You're welcome!</text>
  <text x="128" y="186" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="10" font-family="Georgia, serif" font-style="italic">(unprompted)</text>

  <!-- Awkward pause lines -->
  <line x1="200" y1="240" x2="200" y2="260" stroke="#6a6a9a" stroke-width="1.5" opacity="0.5"/>
  <line x1="192" y1="248" x2="208" y2="248" stroke="#6a6a9a" stroke-width="1.5" opacity="0.5"/>

  <!-- Awkward lines from right person -->
  <line x1="348" y1="242" x2="362" y2="232" stroke="#6a6a9a" stroke-width="1.5" opacity="0.55"/>
  <line x1="352" y1="252" x2="367" y2="252" stroke="#6a6a9a" stroke-width="1.5" opacity="0.55"/>
  <line x1="348" y1="262" x2="362" y2="272" stroke="#6a6a9a" stroke-width="1.5" opacity="0.55"/>

  <!-- Bottom panel -->
  <rect x="0" y="490" width="400" height="110" fill="rgba(0,0,0,0.35)"/>

  <!-- Genre badge -->
  <rect x="20" y="502" width="100" height="22" rx="11" fill="rgba(239,68,68,0.2)"/>
  <text x="70" y="517" text-anchor="middle" fill="#ef4444" font-size="10" font-family="Georgia, serif" font-weight="bold" letter-spacing="1">SLICE OF LIFE</text>

  <!-- Stars -->
  <text x="20" y="549" fill="#f59e0b" font-size="15">★★★★★</text>
  <text x="103" y="548" fill="#9ca3af" font-size="12" font-family="sans-serif"> 4.7</text>

  <!-- Author -->
  <text x="20" y="572" fill="#6b7280" font-size="11" font-family="Georgia, serif">Anonymous</text>

  <!-- Decorative dots -->
  <circle cx="372" cy="510" r="3" fill="#ef4444" opacity="0.35"/>
  <circle cx="360" cy="530" r="2" fill="#f97316" opacity="0.25"/>
  <circle cx="382" cy="555" r="4" fill="#ef4444" opacity="0.18"/>
</svg>
