<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3a"/>
      <stop offset="100%" style="stop-color:#1a1a28"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#bg)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="400" height="75" fill="url(#header)"/>
  <text x="200" y="32" text-anchor="middle" fill="white" font-size="14" font-family="Georgia, serif" font-weight="bold">I Held the Door Open</text>
  <text x="200" y="55" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="13" font-family="Georgia, serif">for Someone Way Too Far Away</text>

  <!-- Interior background -->
  <rect x="0" y="75" width="400" height="415" fill="#111120"/>

  <!-- Floor -->
  <rect x="0" y="350" width="400" height="140" fill="url(#floor)"/>
  <!-- Floor tiles -->
  <line x1="0" y1="380" x2="400" y2="380" stroke="#2a2a3a" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="410" x2="400" y2="410" stroke="#2a2a3a" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="350" x2="100" y2="490" stroke="#2a2a3a" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="350" x2="200" y2="490" stroke="#2a2a3a" stroke-width="1" opacity="0.5"/>
  <line x1="300" y1="350" x2="300" y2="490" stroke="#2a2a3a" stroke-width="1" opacity="0.5"/>

  <!-- Door frame -->
  <rect x="28" y="100" width="100" height="260" rx="2" fill="#2a1a0a" stroke="#4a3a2a" stroke-width="3"/>
  <!-- Door (open) -->
  <rect x="30" y="102" width="95" height="255" rx="1" fill="#3a2a1a" stroke="#5a4a3a" stroke-width="1.5"/>
  <!-- Door panel details -->
  <rect x="40" y="120" width="35" height="80" rx="2" fill="transparent" stroke="#4a3a2a" stroke-width="1"/>
  <rect x="85" y="120" width="30" height="80" rx="2" fill="transparent" stroke="#4a3a2a" stroke-width="1"/>
  <rect x="40" y="215" width="35" height="80" rx="2" fill="transparent" stroke="#4a3a2a" stroke-width="1"/>
  <rect x="85" y="215" width="30" height="80" rx="2" fill="transparent" stroke="#4a3a2a" stroke-width="1"/>
  <!-- Door handle -->
  <circle cx="118" cy="235" r="5" fill="#c0a040"/>
  <rect x="113" y="233" width="12" height="4" rx="2" fill="#c0a040"/>

  <!-- Person holding door (left, at the door) -->
  <!-- Body -->
  <rect x="130" y="268" width="38" height="75" rx="4" fill="#3a5a4a"/>
  <!-- Head -->
  <circle cx="149" cy="249" r="20" fill="#d4a06a"/>
  <!-- Hair -->
  <ellipse cx="149" cy="233" rx="18" ry="9" fill="#4a2a1a"/>
  <!-- Arm reaching to hold door -->
  <line x1="130" y1="280" x2="112" y2="258" stroke="#3a5a4a" stroke-width="8" stroke-linecap="round"/>
  <circle cx="109" cy="255" r="7" fill="#d4a06a"/>
  <!-- Other arm hanging -->
  <line x1="168" y1="278" x2="178" y2="305" stroke="#3a5a4a" stroke-width="8" stroke-linecap="round"/>
  <circle cx="180" cy="308" r="7" fill="#d4a06a"/>
  <!-- Legs -->
  <rect x="134" y="340" width="13" height="35" rx="3" fill="#2a4a3a"/>
  <rect x="151" y="340" width="13" height="35" rx="3" fill="#2a4a3a"/>
  <!-- Frozen smile/grimace -->
  <path d="M 142 257 Q 149 263 156 257" stroke="#a06040" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Wide eyes of anxiety -->
  <circle cx="142" cy="245" r="4" fill="white"/>
  <circle cx="156" cy="245" r="4" fill="white"/>
  <circle cx="143" cy="246" r="2" fill="#1a1a2a"/>
  <circle cx="157" cy="246" r="2" fill="#1a1a2a"/>

  <!-- Timer / clock indicator (showing how long door has been held) -->
  <rect x="148" y="118" width="90" height="38" rx="6" fill="#1a1a3a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="193" y="133" text-anchor="middle" fill="#ef4444" font-size="9" font-family="monospace" font-weight="bold">HOLDING: 00:27</text>
  <text x="193" y="148" text-anchor="middle" fill="#9ca3af" font-size="8" font-family="Georgia, serif">feels like 3-5 business days</text>

  <!-- Distant person (very far away, small) -->
  <rect x="298" y="290" width="24" height="58" rx="3" fill="#5a3a6a"/>
  <circle cx="310" cy="274" r="15" fill="#c8956a"/>
  <ellipse cx="310" cy="262" rx="13" ry="7" fill="#1a1a1a"/>
  <!-- Distant person doing uncomfortable fast-walk -->
  <rect x="300" y="344" width="8" height="25" rx="2" fill="#3a2a4a"/>
  <rect x="312" y="344" width="8" height="25" rx="2" fill="#3a2a4a"/>
  <!-- Motion lines for fast walk -->
  <line x1="290" y1="308" x2="278" y2="308" stroke="#6a6a9a" stroke-width="1.5" opacity="0.6"/>
  <line x1="290" y1="318" x2="276" y2="316" stroke="#6a6a9a" stroke-width="1.5" opacity="0.5"/>
  <line x1="290" y1="328" x2="278" y2="330" stroke="#6a6a9a" stroke-width="1.5" opacity="0.4"/>

  <!-- Distance indicator arrow -->
  <line x1="182" y1="310" x2="296" y2="310" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>
  <polygon points="295,305 305,310 295,315" fill="#ef4444" opacity="0.6"/>
  <polygon points="183,305 173,310 183,315" fill="#ef4444" opacity="0.6"/>
  <rect x="215" y="296" width="72" height="20" rx="4" fill="rgba(0,0,0,0.5)"/>
  <text x="251" y="310" text-anchor="middle" fill="#ef4444" font-size="9.5" font-family="Georgia, serif" font-weight="bold">~30 feet away</text>

  <!-- Thought bubble from door-holder -->
  <circle cx="190" cy="195" r="5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="202" cy="183" r="7" fill="rgba(255,255,255,0.4)"/>
  <ellipse cx="232" cy="160" rx="52" ry="25" fill="white" opacity="0.92"/>
  <text x="232" y="155" text-anchor="middle" fill="#1a1a2e" font-size="10" font-family="Georgia, serif" font-style="italic">I've committed.</text>
  <text x="232" y="170" text-anchor="middle" fill="#1a1a2e" font-size="10" font-family="Georgia, serif" font-style="italic">There's no exit.</text>

  <!-- Bottom panel -->
  <rect x="0" y="490" width="400" height="110" fill="rgba(0,0,0,0.35)"/>

  <!-- Genre badge -->
  <rect x="20" y="502" width="100" height="22" rx="11" fill="rgba(239,68,68,0.2)"/>
  <text x="70" y="517" text-anchor="middle" fill="#ef4444" font-size="10" font-family="Georgia, serif" font-weight="bold" letter-spacing="1">SLICE OF LIFE</text>

  <!-- Stars -->
  <text x="20" y="549" fill="#f59e0b" font-size="15">★★★★★</text>
  <text x="103" y="548" fill="#9ca3af" font-size="12" font-family="sans-serif"> 4.6</text>

  <!-- Author -->
  <text x="20" y="572" fill="#6b7280" font-size="11" font-family="Georgia, serif">Anonymous</text>

  <!-- Decorative dots -->
  <circle cx="372" cy="510" r="3" fill="#ef4444" opacity="0.35"/>
  <circle cx="360" cy="530" r="2" fill="#f97316" opacity="0.25"/>
  <circle cx="382" cy="555" r="4" fill="#ef4444" opacity="0.18"/>
</svg>
