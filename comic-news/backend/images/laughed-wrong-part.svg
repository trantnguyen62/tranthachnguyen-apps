<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#bg)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="400" height="75" fill="url(#header)"/>
  <text x="200" y="30" text-anchor="middle" fill="white" font-size="15" font-family="Georgia, serif" font-weight="bold">I Laughed at the Wrong Part</text>
  <text x="200" y="54" text-anchor="middle" fill="rgba(255,255,255,0.88)" font-size="13" font-family="Georgia, serif">of Someone's Story</text>

  <!-- Table surface -->
  <ellipse cx="200" cy="400" rx="180" ry="36" fill="#2a1a0a" stroke="#3a2a1a" stroke-width="2"/>

  <!-- Dinner plates -->
  <ellipse cx="120" cy="386" rx="34" ry="17" fill="#3a3a5a" stroke="#5a5a7a" stroke-width="1.5"/>
  <ellipse cx="120" cy="384" rx="27" ry="13" fill="#4a4a6a"/>
  <ellipse cx="280" cy="386" rx="34" ry="17" fill="#3a3a5a" stroke="#5a5a7a" stroke-width="1.5"/>
  <ellipse cx="280" cy="384" rx="27" ry="13" fill="#4a4a6a"/>

  <!-- Wine glasses -->
  <path d="M 165 370 L 165 360 Q 159 352 155 342 L 175 342 Q 171 352 165 360" fill="#6a9aaa" opacity="0.55" stroke="#8abaca" stroke-width="0.5"/>
  <rect x="163" y="370" width="4" height="12" fill="#6a9aaa" opacity="0.45"/>
  <rect x="158" y="382" width="14" height="3" fill="#6a9aaa" opacity="0.4"/>

  <path d="M 235 370 L 235 360 Q 229 352 225 342 L 245 342 Q 241 352 235 360" fill="#6a9aaa" opacity="0.55" stroke="#8abaca" stroke-width="0.5"/>
  <rect x="233" y="370" width="4" height="12" fill="#6a9aaa" opacity="0.45"/>
  <rect x="228" y="382" width="14" height="3" fill="#6a9aaa" opacity="0.4"/>

  <!-- Storyteller (left, serious expression) -->
  <rect x="52" y="270" width="40" height="100" rx="5" fill="#3a4a6a"/>
  <circle cx="72" cy="252" r="20" fill="#c8956a"/>
  <ellipse cx="72" cy="235" rx="18" ry="8" fill="#2a1a0a"/>
  <!-- Sad/serious mouth -->
  <path d="M 64 262 Q 72 258 80 262" stroke="#8a5030" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Person laughing (right, inappropriate timing) -->
  <rect x="300" y="262" width="44" height="108" rx="5" fill="#2a4a3a"/>
  <circle cx="322" cy="243" r="22" fill="#d4a06a"/>
  <ellipse cx="322" cy="226" rx="20" ry="9" fill="#1a1a1a"/>
  <!-- Laughing mouth -->
  <path d="M 311 254 Q 322 264 333 254" stroke="#a06040" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Storyteller's speech bubble (serious) -->
  <ellipse cx="138" cy="175" rx="78" ry="28" fill="white" opacity="0.93"/>
  <polygon points="112,203 96,218 118,207" fill="white" opacity="0.93"/>
  <text x="138" y="170" text-anchor="middle" fill="#1a1a2e" font-size="10.5" font-family="Georgia, serif" font-style="italic">...and that's when</text>
  <text x="138" y="185" text-anchor="middle" fill="#1a1a2e" font-size="10.5" font-family="Georgia, serif" font-style="italic">the car broke down—</text>

  <!-- Laugher's bubble (red, prominent) -->
  <ellipse cx="282" cy="168" rx="70" ry="30" fill="#ef4444"/>
  <polygon points="302,198 318,214 294,204" fill="#ef4444"/>
  <text x="282" y="163" text-anchor="middle" fill="white" font-size="18" font-family="Georgia, serif" font-weight="bold" font-style="italic">Ha!</text>
  <text x="282" y="183" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="11" font-family="Georgia, serif" font-style="italic">(wrong moment)</text>

  <!-- Eyes looking over from surrounding guests, implied -->
  <line x1="200" y1="280" x2="200" y2="260" stroke="#6a6a9a" stroke-width="1.5" opacity="0.45"/>
  <line x1="192" y1="266" x2="208" y2="274" stroke="#6a6a9a" stroke-width="1.5" opacity="0.45"/>

  <!-- Bottom panel -->
  <rect x="0" y="490" width="400" height="110" fill="rgba(0,0,0,0.35)"/>

  <!-- Genre badge -->
  <rect x="20" y="502" width="100" height="22" rx="11" fill="rgba(239,68,68,0.2)"/>
  <text x="70" y="517" text-anchor="middle" fill="#ef4444" font-size="10" font-family="Georgia, serif" font-weight="bold" letter-spacing="1">SLICE OF LIFE</text>

  <!-- Stars -->
  <text x="20" y="549" fill="#f59e0b" font-size="15">★★★★★</text>
  <text x="103" y="548" fill="#9ca3af" font-size="12" font-family="sans-serif"> 4.6</text>

  <!-- Author -->
  <text x="20" y="572" fill="#6b7280" font-size="11" font-family="Georgia, serif">Anonymous</text>

  <!-- Decorative dots -->
  <circle cx="372" cy="510" r="3" fill="#ef4444" opacity="0.35"/>
  <circle cx="360" cy="530" r="2" fill="#f97316" opacity="0.25"/>
  <circle cx="382" cy="555" r="4" fill="#ef4444" opacity="0.18"/>
</svg>
