<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Security Headers -->
  <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' https://cdn.tailwindcss.com https://aistudiocdn.com 'unsafe-inline';
      style-src 'self' https://fonts.googleapis.com https://cdn.tailwindcss.com 'unsafe-inline';
      font-src 'self' https://fonts.gstatic.com;
      connect-src 'self' ws://localhost:* wss://localhost:* ws://127.0.0.1:* wss://127.0.0.1:* wss://linguaflow.tranthachnguyen.com https://aistudiocdn.com;
      img-src 'self' data: https:;
      media-src 'self';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      upgrade-insecure-requests;
    ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <meta name="description" content="Practice speaking Spanish, French, German, Japanese, Vietnamese, or English with an AI conversation partner. Real-time voice feedback and pronunciation coaching." />
  <meta name="keywords" content="AI language learning, speak Spanish online, speak French online, speak German online, speak Japanese online, speak Vietnamese online, language conversation practice, pronunciation coaching, AI tutor" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0f172a" />
  <title>LinguaFlow - Free AI Language Partner | Practice Speaking</title>

  <!-- Canonical URL -->
  <link rel="canonical" href="https://linguaflow.tranthachnguyen.com/" />
  <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://linguaflow.tranthachnguyen.com/" />
  <meta property="og:title" content="LinguaFlow - AI Language Partner" />
  <meta property="og:description" content="Practice speaking Spanish, French, German, Japanese, Vietnamese, or English with an AI conversation partner. Real-time voice feedback and pronunciation coaching." />
  <meta property="og:site_name" content="LinguaFlow" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="LinguaFlow - AI Language Partner" />
  <meta name="twitter:description" content="Practice speaking Spanish, French, German, Japanese, Vietnamese, or English with an AI conversation partner. Real-time voice feedback and pronunciation coaching." />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "LinguaFlow",
    "description": "Practice speaking Spanish, French, German, Japanese, Vietnamese, or English with an AI conversation partner. Real-time voice feedback and pronunciation coaching.",
    "url": "https://linguaflow.tranthachnguyen.com/",
    "applicationCategory": "EducationApplication",
    "operatingSystem": "Web",
    "browserRequirements": "Requires a modern browser with microphone access",
    "inLanguage": ["en", "es", "fr", "de", "ja", "vi"],
    "featureList": [
      "Real-time AI voice conversation",
      "Pronunciation feedback",
      "Multiple language support",
      "Live transcript",
      "Adjustable difficulty levels"
    ],
    "audience": {
      "@type": "Audience",
      "audienceType": "Language learners"
    },
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "potentialAction": {
      "@type": "UseAction",
      "target": "https://linguaflow.tranthachnguyen.com/"
    }
  }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      /* Slate 900 */
      color: #f8fafc;
      /* Slate 50 */
    }

    @keyframes msgFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-fade-in {
      animation: msgFadeIn 0.18s ease-out both;
    }

    @media (prefers-reduced-motion: reduce) {
      .msg-fade-in {
        animation: none;
      }
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
